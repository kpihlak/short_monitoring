<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- Docker Environment Box -->
  <rect x="50" y="50" width="700" height="500" rx="10" fill="#e6f7ff" stroke="#1890ff" stroke-width="2" />
  <text x="400" y="80" font-family="Arial" font-size="18" text-anchor="middle" fill="#1890ff">Docker Environment</text>
  
  <!-- Docker Network -->
  <rect x="100" y="100" width="600" height="400" rx="10" fill="#f0f5ff" stroke="#1890ff" stroke-dasharray="5,5" stroke-width="2" />
  <text x="400" y="130" font-family="Arial" font-size="16" text-anchor="middle" fill="#1890ff">monitoring_net</text>
  
  <!-- Components -->
  <!-- NGINX -->
  <rect x="100" y="150" width="120" height="70" rx="5" fill="#ffffff" stroke="#1890ff" stroke-width="2" />
  <text x="160" y="185" font-family="Arial" font-size="16" text-anchor="middle" fill="#1890ff">NGINX</text>
  <text x="160" y="205" font-family="Arial" font-size="12" text-anchor="middle" fill="#1890ff">Reverse Proxy</text>
  
  <!-- Flask App -->
  <rect x="140" y="280" width="120" height="70" rx="5" fill="#ffffff" stroke="#40a9ff" stroke-width="2" />
  <text x="200" y="315" font-family="Arial" font-size="16" text-anchor="middle" fill="#40a9ff">Flask App</text>
  <text x="200" y="335" font-family="Arial" font-size="12" text-anchor="middle" fill="#40a9ff">Chuck Norris Facts</text>

  <!-- Logs -->
  <rect x="190" y="400" width="100" height="50" rx="5" fill="#ffffff" stroke="#40a9ff" stroke-width="2" />
  <text x="240" y="430" font-family="Arial" font-size="14" text-anchor="middle" fill="#40a9ff">Logs</text>
  
  <!-- Telegraf -->
  <rect x="340" y="200" width="120" height="70" rx="5" fill="#ffffff" stroke="#52c41a" stroke-width="2" />
  <text x="400" y="235" font-family="Arial" font-size="16" text-anchor="middle" fill="#52c41a">Telegraf</text>
  <text x="400" y="255" font-family="Arial" font-size="12" text-anchor="middle" fill="#52c41a">Data Collector</text>
  
  <!-- InfluxDB -->
  <rect x="500" y="280" width="120" height="70" rx="5" fill="#ffffff" stroke="#fa8c16" stroke-width="2" />
  <text x="560" y="315" font-family="Arial" font-size="16" text-anchor="middle" fill="#fa8c16">InfluxDB</text>
  <text x="560" y="335" font-family="Arial" font-size="12" text-anchor="middle" fill="#fa8c16">Time-Series DB</text>
  
  <!-- Chronograf -->
  <rect x="580" y="160" width="120" height="70" rx="5" fill="#ffffff" stroke="#722ed1" stroke-width="2" />
  <text x="640" y="195" font-family="Arial" font-size="16" text-anchor="middle" fill="#722ed1">Chronograf</text>
  <text x="640" y="215" font-family="Arial" font-size="12" text-anchor="middle" fill="#722ed1">Visualization</text>
  
  <!-- Kapacitor -->
  <rect x="500" y="400" width="120" height="70" rx="5" fill="#ffffff" stroke="#f5222d" stroke-width="2" />
  <text x="560" y="435" font-family="Arial" font-size="16" text-anchor="middle" fill="#f5222d">Kapacitor</text>
  <text x="560" y="455" font-family="Arial" font-size="12" text-anchor="middle" fill="#f5222d">Alerting (Optional)</text>
  
  <!-- External API -->
  <rect x="40" y="400" width="120" height="70" rx="5" fill="#ffffff" stroke="#ff7a45" stroke-width="2" />
  <text x="100" y="435" font-family="Arial" font-size="16" text-anchor="middle" fill="#ff7a45">Chuck Norris API</text>
  <text x="100" y="455" font-family="Arial" font-size="12" text-anchor="middle" fill="#ff7a45">External Service</text>
  
  <!-- User -->
  <circle cx="50" y="185" r="25" fill="#ffffff" stroke="#1890ff" stroke-width="2" />
  <text x="50" y="185" font-family="Arial" font-size="10" text-anchor="middle" dominant-baseline="middle" fill="#1890ff">User</text>
  
  <!-- Connection Lines -->
  <!-- User to NGINX -->
  <line x1="75" y1="185" x2="100" y2="185" stroke="#1890ff" stroke-width="2" />
  <polygon points="95,180 100,185 95,190" fill="#1890ff" />
  
  <!-- NGINX to Flask App -->
  <line x1="160" y1="220" x2="180" y2="280" stroke="#40a9ff" stroke-width="2" />
  <polygon points="175,275 180,280 171,278" fill="#40a9ff" />
  
  <!-- NGINX to Chronograf -->
  <line x1="220" y1="185" x2="580" y2="195" stroke="#722ed1" stroke-width="2" />
  <polygon points="575,190 580,195 572,198" fill="#722ed1" />
  
  <!-- Flask App to Logs -->
  <line x1="200" y1="350" x2="230" y2="400" stroke="#40a9ff" stroke-width="2" />
  <polygon points="225,395 230,400 221,398" fill="#40a9ff" />
  
  <!-- Flask App to Chuck Norris API -->
  <line x1="140" y1="315" x2="120" y2="400" stroke="#ff7a45" stroke-width="2" />
  <polygon points="115,395 120,400 111,396" fill="#ff7a45" />
  <text x="100" y="370" font-family="Arial" font-size="10" fill="#ff7a45" transform="rotate(-60, 100, 370)">HTTPS</text>
  
  <!-- Telegraf to Flask App (monitoring) -->
  <line x1="340" y1="235" x2="260" y2="295" stroke="#52c41a" stroke-width="2" stroke-dasharray="5,3" />
  <polygon points="258,289 260,295 253,291" fill="#52c41a" />
  
  <!-- Telegraf to Logs -->
  <line x1="370" y1="270" x2="270" y2="400" stroke="#52c41a" stroke-width="2" stroke-dasharray="5,3" />
  <polygon points="268,394 270,400 262,396" fill="#52c41a" />
  
  <!-- Telegraf to InfluxDB -->
  <line x1="460" y1="235" x2="520" y2="280" stroke="#52c41a" stroke-width="2" />
  <polygon points="515,275 520,280 512,282" fill="#52c41a" />
  <text x="490" y="250" font-family="Arial" font-size="10" fill="#52c41a">Write</text>
  
  <!-- Chronograf to InfluxDB -->
  <line x1="610" y1="230" x2="570" y2="280" stroke="#722ed1" stroke-width="2" />
  <polygon points="574,278 570,280 569,273" fill="#722ed1" />
  <text x="600" y="255" font-family="Arial" font-size="10" fill="#722ed1">Query</text>
  
  <!-- InfluxDB to Kapacitor -->
  <line x1="560" y1="350" x2="560" y2="400" stroke="#f5222d" stroke-width="2" />
  <polygon points="555,395 560,400 565,395" fill="#f5222d" />
  
  <!-- Ports and Details -->
  <text x="80" y="180" font-family="Arial" font-size="10" fill="#333333">Port 80</text>
  <text x="625" y="160" font-family="Arial" font-size="10" fill="#333333">Port 8888</text>
  <text x="535" y="280" font-family="Arial" font-size="10" fill="#333333">Port 8086</text>
  
  <!-- Legend -->
  <rect x="600" y="480" width="120" height="60" rx="5" fill="#ffffff" stroke="#333333" stroke-width="1" />
  <text x="660" y="500" font-family="Arial" font-size="14" text-anchor="middle" fill="#333333">Legend</text>
  
  <line x1="610" y1="520" x2="630" y2="520" stroke="#333333" stroke-width="2" />
  <text x="670" y="523" font-family="Arial" font-size="10" fill="#333333">Data Flow</text>
  
  <line x1="610" y1="540" x2="630" y2="540" stroke="#333333" stroke-width="2" stroke-dasharray="5,3" />
  <text x="670" y="543" font-family="Arial" font-size="10" fill="#333333">Monitoring</text>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#333333">TICK Stack Topology with Chuck Norris Application</text>
</svg>
